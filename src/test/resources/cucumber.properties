# Cucumber configuration
# Scenarios tagged @LLMRequired need a real LLM reachable (LM Studio locally, or GitHub Models in CI).
# They are included by default; remove the tag from the scenario or override this filter when skipping.
cucumber.publish.quiet=true
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4

