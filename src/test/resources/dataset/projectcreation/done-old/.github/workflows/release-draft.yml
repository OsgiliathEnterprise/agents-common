name: Release Draft

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build and stage artifacts
        run: ./gradlew clean assemble publishMavenJavaPublicationToStagingRepository --stacktrace

      - name: Create GitHub release draft
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew jreleaserRelease -Pjreleaser.draft=true --stacktrace

