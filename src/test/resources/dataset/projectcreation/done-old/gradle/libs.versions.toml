[versions]
springBoot = "3.4.3"
springDependencyManagement = "1.1.7"
jreleaser = "1.17.0"
sonarqube = "4.0.0.4121"
cucumber = "7.20.1"
jacoco = "0.8.9"

[plugins]
springBoot = { id = "org.springframework.boot", version.ref = "springBoot" }
springDependencyManagement = { id = "io.spring.dependency-management", version.ref = "springDependencyManagement" }
jreleaser = { id = "org.jreleaser", version.ref = "jreleaser" }
sonarqube = { id = "org.sonarqube", version.ref = "sonarqube" }

[libraries]
springBootStarter = { module = "org.springframework.boot:spring-boot-starter" }
cucumberJunit = { module = "io.cucumber:cucumber-junit-platform-engine", version.ref = "cucumber" }
